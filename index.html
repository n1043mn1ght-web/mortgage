<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartCalc — Fast Loan, Mortgage & Age Calculator</title>
    <meta name="description" content="Calculate mortgage, interest, percentages, and age online for free. Simple, fast, and accurate tools for everyday tasks.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#F8F9FA] text-[#202124]">
    <nav class="p-6 border-b bg-white">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-[#1a73e8]">SmartCalc</h1>
            <div class="space-x-4 text-sm font-medium text-[#5f6368]">
                <button onclick="showCalc('loan')" class="hover:text-[#1a73e8]">Mortgage</button>
                <button onclick="showCalc('percent')" class="hover:text-[#1a73e8]">Percent</button>
                <button onclick="showCalc('age')" class="hover:text-[#1a73e8]">Age</button>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto mt-12 p-4">
        <!-- Loan / Mortgage Calculator -->
        <div id="loan-calc" class="calc-card active">
            <h2 class="text-3xl font-bold mb-6">Mortgage & Loan Calculator</h2>
            <div class="grid md:grid-cols-2 gap-8">
                <div class="space-y-4">
                    <div>
                        <label>Loan Amount ($)</label>
                        <input type="number" id="amount" value="300000" oninput="calcLoan()">
                    </div>
                    <div>
                        <label>Interest Rate (%)</label>
                        <input type="number" id="rate" value="5.5" step="0.1" oninput="calcLoan()">
                    </div>
                    <div>
                        <label>Loan Term (Years)</label>
                        <input type="number" id="term" value="30" oninput="calcLoan()">
                    </div>
                </div>
                <div class="bg-[#E8F0FE] p-8 rounded-3xl flex flex-col justify-center items-center">
                    <span class="text-sm text-[#1967d2] uppercase font-bold tracking-wider">Monthly Payment</span>
                    <div id="loan-result" class="text-5xl font-bold text-[#1a73e8] mt-2">$0</div>
                </div>
            </div>
        </div>

        <!-- Другие калькуляторы (структура аналогична) -->
        <div id="percent-calc" class="calc-card hidden">
            <h2 class="text-3xl font-bold mb-6">Percentage Calculator</h2>
            <div class="grid md:grid-cols-2 gap-8">
                <div class="space-y-4">
                    <label>What is <input type="number" id="p-val" value="10" class="inline w-24 mx-2" oninput="calcPercent()"> % of <input type="number" id="p-total" value="200" class="inline w-24 mx-2" oninput="calcPercent()"></label>
                </div>
                <div class="bg-[#F1F3F4] p-8 rounded-3xl flex flex-col justify-center items-center">
                    <div id="percent-result" class="text-5xl font-bold text-[#202124]">$0</div>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
